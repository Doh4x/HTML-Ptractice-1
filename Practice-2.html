<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #b3ff00;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    hr { border: none; }
  </style>
</head>
<body>
  Линейка по умолчанию
  <hr style="border: 1px solid #a71e1e;">

  Тонкая линейка
  <hr style="border: 1px solid #ffffff; width: 100%;">

  Толстая линейка
  <hr style="border: 8px solid #b10d4c;">

  Плоская линейка
  <hr style="border: 10px solid #152264; width: 100%;">

  Пунктирная линейка
  <hr style="border: 3px dashed #000000;">

  Двойная линейка
  <hr style="border: 4px double #1ee424;">

  Линейки с выравниванием
  <hr style="border: 2px solid #4c00ff; width: 30%; margin-left: 0;">
  <hr style="border: 2px solid #ffcc80; width: 30%; margin: 0 auto;">
  <hr style="border: 2px solid #ffcc80; width: 30%; margin-left: auto; margin-right: 0;">
</body>
</html>
